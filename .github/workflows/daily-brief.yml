name: 每日新聞簡報

on:
  # 台灣時間 08:00 主要觸發；09:30 為備用觸發
  # GitHub 排程不保證準時，備用確保當天必有一次成功
  schedule:
    - cron: '0 0 * * *'   # 08:00 台灣（主要）
    - cron: '30 1 * * *'  # 09:30 台灣（備用）
  # 手動觸發（補跑 / 強制重跑用）
  workflow_dispatch:
    inputs:
      force:
        description: '強制重跑（覆蓋今日已有的簡報）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      backfill:
        description: '補跑舊設計（把所有舊文章套上新版外觀，不呼叫 Gemini）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 確認執行模式
        id: check
        run: |
          TODAY=$(TZ='Asia/Taipei' date +'%Y-%m-%d')
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          FORCE="${{ github.event.inputs.force }}"
          BACKFILL="${{ github.event.inputs.backfill }}"
          if [ "$BACKFILL" = "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "mode=backfill" >> $GITHUB_OUTPUT
            echo "🔄 Backfill 模式：重新套用新設計到所有舊文章"
          elif [ -f "${TODAY}.html" ] && [ "$FORCE" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "mode=skip" >> $GITHUB_OUTPUT
            echo "✅ 今日簡報 ${TODAY}.html 已存在，略過（手動強制請選 force=true）"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "mode=generate" >> $GITHUB_OUTPUT
            echo "📰 生成模式：呼叫 Gemini 產生今日簡報"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        if: steps.check.outputs.skip == 'false'
        run: pip install google-genai

      - name: 執行腳本
        if: steps.check.outputs.skip == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKFILL: ${{ github.event.inputs.backfill }}
        run: python generate_brief.py

      - name: Commit 並 Push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.email "bot@daily-brief"
          git config user.name "Daily Brief Bot"
          git add -A
          git diff --cached --quiet || git commit -m "📅 $(date -u +'%Y-%m-%d') 每日簡報更新"
          git push
